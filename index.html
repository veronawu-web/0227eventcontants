<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 VIP Offline Gala | Exclusive Access</title>
    <style>
        /* --- 1. 繼承原始樣式 (保持設計美感) --- */
        :root {
            --bg-dark: #05050a; 
            --brand-gold: #d4af37; 
            --gold-light: #fceabb;
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --silver-gradient: linear-gradient(135deg, #a8caba 0%, #5d9193 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2); 
            --text-dim: rgba(255, 255, 255, 0.6);
            --brand-pink: #ff2d78;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 20px; perspective: 1000px; }
        .hero-banner { width: 100%; display: block; background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-dark) 70%); padding-top: 10px; }
        .hero-image { width: 100%; height: auto; display: block; }

        /* --- 基礎資訊區 --- */
        .basic-info-box { margin: 0 20px 30px; padding: 20px; border-radius: 20px; background: linear-gradient(180deg, rgba(20, 20, 35, 0.8) 0%, var(--bg-dark) 100%); border: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .info-item { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .info-icon { width: 32px; height: 32px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold-light); border: 1px solid var(--glass-border); }

        /* --- 主播輪播區 --- */
        .host-section { margin-bottom: 30px; position: relative; width: 100%; }
        .carousel-wrapper { display: flex; overflow-x: auto; gap: 0; scroll-snap-type: x mandatory; padding: 30px 0; scrollbar-width: none; -ms-overflow-style: none; }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        .host-card { flex: 0 0 70%; scroll-snap-align: center; position: relative; border-radius: 30px; overflow: hidden; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0.85); opacity: 0.3; filter: blur(2px) grayscale(40%); border: 1px solid var(--glass-border); aspect-ratio: 4/5; cursor: pointer; }
        .host-card.active { transform: scale(1.05); opacity: 1; filter: blur(0) grayscale(0); border-color: var(--brand-gold); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2); z-index: 2; }
        .host-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .host-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); text-align: center; pointer-events: none; }
        .carousel-spacer { flex: 0 0 15%; }

        /* --- 互動流程與等級 --- */
        .interaction-flow { margin: 0 20px 40px; padding: 25px 15px; border-radius: 24px; background: var(--glass); border: 1px solid var(--glass-border); text-align: center; }
        .flow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .flow-icon { width: 45px; height: 45px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--brand-gold); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--brand-gold); }
        .tiers-header { padding: 0 20px; margin-bottom: 20px; color: var(--gold-light); font-size: 1.2rem; font-weight: 800; text-align: center; letter-spacing: 2px; }
        .tier-cards-stack { display: flex; flex-direction: column; gap: 15px; margin: 0 20px 40px; }
        .tier-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; }
        .tier-gold { border: 2px solid var(--brand-gold); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15); }
        .tier-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; display: block; color: var(--brand-gold); }
        .tier-content-list { list-style: none; font-size: 13px; color: #eee; }

        /* --- 底部按鈕區 (關鍵變動) --- */
        .cta-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg-dark) 80%, transparent 100%); z-index: 1000; }
        
        .main-btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; display: block; transition: all 0.3s ease; }
        
        /* 狀態 1: 報名按鈕 (金) */
        .btn-enroll { background: var(--gold-gradient); color: black; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); }
        
        /* 狀態 2: 成為 VIP 按鈕 (銀) */
        .btn-upgrade { background: var(--silver-gradient); color: white; box-shadow: 0 10px 30px rgba(93, 145, 147, 0.4); }
        
        /* 狀態 3: 載入中 (灰動畫) */
        .btn-loading { background: #222; color: #555; cursor: wait; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- Modal --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #0a0a14; border: 1px solid var(--glass-border); width: 90%; max-width: 420px; height: 85vh; border-radius: 30px; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(212, 175, 55, 0.2); border: none; color: var(--gold-light); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .modal-img { width: 100%; height: 320px; object-fit: cover; }
        .modal-body { padding: 25px; }
        .ticket-badge { background: var(--gold-gradient); color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; margin-right: 8px; }
        .btn-profile { display: block; width: 100%; padding: 16px; border-radius: 15px; background: var(--gold-gradient); color: black; font-weight: bold; text-decoration: none; margin-top: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-banner">
            <img src="https://public.swag.live/campaigns/vip-offline-event/%E8%B3%87%E7%94%A2%201.png" class="hero-image" alt="2026 VIP GALA">
        </header>

        <section class="basic-info-box">
            <div class="info-item"><div class="info-icon">📅</div><div><p style="font-size: 10px; opacity: 0.6;">活動時間</p><p style="font-weight: bold; font-size: 13px; color: var(--gold-light);">2026/03/29 (週日) 13:00 - 17:00</p></div></div>
            <div class="info-item"><div class="info-icon">📍</div><div><p style="font-size: 10px; opacity: 0.6;">活動地點</p><p style="font-weight: bold; font-size: 13px; color: var(--gold-light);">台北市大直區 (3/23私訊行前通知)</p></div></div>
        </section>

        <section class="host-section">
            <div class="carousel-wrapper" id="carousel"></div>
            <p style="text-align: center; font-size: 13px; color: var(--brand-gold); margin-top: 15px; letter-spacing: 1px;">✦ 點擊卡片查看互動詳情 ✦</p>
        </section>

        <section class="interaction-flow">
            <h3 style="font-size: 15px; color: var(--brand-gold); letter-spacing: 2px;">✦ 活動互動流程 ✦</h3>
            <div class="flow-grid">
                <div class="flow-step"><div class="flow-icon">🎟️</div><p style="font-size:11px;font-weight:bold;">購買互動券</p></div>
                <div class="flow-step"><div class="flow-icon">🥂</div><p style="font-size:11px;font-weight:bold;">尋找心儀主播</p></div>
                <div class="flow-step"><div class="flow-icon">💖</div><p style="font-size:11px;font-weight:bold;">一對一包廂</p></div>
            </div>
        </section>

        <div class="tiers-header">👑 報到福利與階級特權</div>
        <section class="tier-cards-stack">
            <div class="tier-card"><span class="tier-title">LV 1 +</span><ul class="tier-content-list"><li>報到鑽石、精緻茶點、抽鑽石大獎</li></ul></div>
            <div class="tier-card tier-gold"><span class="tier-title">VIP LV 50 +</span><ul class="tier-content-list"><li>專屬酒水、獨立休息室、額外互動券</li></ul></div>
        </section>

        <footer style="text-align: center; font-size: 10px; color: var(--text-dim); padding-bottom: 150px;">* 活動最終解釋權歸本平台所有</footer>
    </div>

    <!-- 底部動態按鈕 -->
    <div class="cta-container">
        <button id="main-enroll-btn" class="main-btn btn-loading">核對會員資格中...</button>
    </div>

    <!-- Modal -->
    <div class="modal" id="host-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">×</button>
            <img id="modal-img" src="" class="modal-img">
            <div class="modal-body">
                <h2 id="modal-name" style="color: white; margin-bottom: 5px;"></h2>
                <p id="modal-handle" style="color: var(--brand-gold); font-size: 14px; font-weight: bold;"></p>
                <div id="modal-menu-container"></div>
                <a id="modal-link" href="#" target="_blank" class="btn-profile">前往主播主頁</a>
            </div>
        </div>
    </div>
    <script>
    // --- 1. 設定區 ---
    const CONFIG = {
        // 請填入主管給您的正式 Webhook 網址 (需為 /webhook/ 開頭)
        API_URL: "https://swagops.app.n8n.cloud/webhook/LimBWnyjWWuMMNDe", 
        
        RECHARGE_URL: "https://swag.live/recharge", 
        FORM_URL: "https://docs.google.com/forms/d/e/1FAIpQLSdvjDWBwBhT37z7a8CK5rH5dXzIxJeKhWokhNK79OY8LCdjTA/viewform?usp=dialog"
    };

    // --- 2. 核心邏輯：精準對接主管給的資料結構 ---
    async function checkVipAndRender() {
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid'); 
        const btn = document.getElementById('main-enroll-btn');

        if (!uid) {
            setUpgradeBtn(btn, "立即成為 VIP (請先登入)");
            return;
        }

        const finalApiUrl = CONFIG.API_URL + "?uid=" + uid;

        try {
            console.log("正在串接 n8n 數據...");
            const res = await fetch(finalApiUrl, {
                method: 'GET',
                mode: 'cors' // 這裡需要 n8n 那邊開啟 Access-Control-Allow-Origin
            });

            // 取得主管給的那份 JSON 資料 [ { ... } ]
            const data = await res.json();
            console.log("收到主管定義的資料結構:", data);

            // --- 依照主管資料結構進行抓取 ---
            var userLevel = 0;

            // 邏輯：data 是陣列 [0] -> 找到 level_info -> 找到 level
            if (Array.isArray(data) && data.length > 0) {
                const userInfo = data[0]; // 抓取陣列第一筆
                if (userInfo.level_info && typeof userInfo.level_info.level !== 'undefined') {
                    userLevel = userInfo.level_info.level;
                }
            }

            console.log("最終判定等級為:", userLevel);

            // 判斷等級：只要等級 >= 1 就顯示報名按鈕
            if (userLevel >= 1) {
                setEnrollBtn(btn);
            } else {
                // 如果 level 為 0 (如您提供的範例)，則顯示成為 VIP
                setUpgradeBtn(btn, "立即成為 VIP");
            }

        } catch (e) {
            console.error("串接失敗，原因可能是 CORS 或網址錯誤:", e);
            setUpgradeBtn(btn, "立即成為 VIP");
        }
    }

    // 按鈕切換功能
    function setEnrollBtn(el) {
        el.innerText = "立即報名參加同樂會";
        el.className = "main-btn btn-enroll";
        el.onclick = () => window.open(CONFIG.FORM_URL, '_blank');
    }

    function setUpgradeBtn(el, text) {
        el.innerText = text;
        el.className = "main-btn btn-upgrade";
        el.onclick = () => window.open(CONFIG.RECHARGE_URL, '_blank');
    }

    window.onload = () => {
        checkVipAndRender();
        // initHosts(); // 如果有主播卡片功能請開啟
    };
</script>
</body>
</html>
