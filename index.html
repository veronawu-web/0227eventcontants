<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>2026 VIP Offline Gala | Exclusive Access</title>
    <style>
        :root {
            --bg-dark: #05050a; 
            --brand-gold: #d4af37; 
            --gold-light: #fceabb;
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2); 
            --text-dim: rgba(255, 255, 255, 0.6);
            --brand-pink: #ff2d78;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; line-height: 1.5; }

        /* --- 多語系按鈕 (右上角) --- */
        .lang-switcher {
            position: fixed; top: 15px; right: 15px; z-index: 2000;
            display: flex; gap: 5px;
        }
        .lang-btn {
            padding: 5px 10px; font-size: 11px; border-radius: 4px;
            background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border);
            color: white; cursor: pointer; backdrop-filter: blur(10px);
        }
        .lang-btn.active { border-color: var(--brand-gold); color: var(--brand-gold); font-weight: bold; }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 20px; }

        .hero-banner { width: 100%; display: block; background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-dark) 70%); }
        .hero-image { width: 100%; height: auto; display: block; }

        .basic-info-box {
            margin: -20px 20px 30px; padding: 20px; border-radius: 20px;
            background: linear-gradient(180deg, rgba(20, 20, 35, 0.9) 0%, var(--bg-dark) 100%);
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10;
        }
        .info-item { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .info-icon { width: 32px; height: 32px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold-light); border: 1px solid var(--glass-border); }

        /* --- 主播輪播 --- */
        .carousel-wrapper {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        .host-card {
            flex: 0 0 70%; scroll-snap-align: center; border-radius: 24px; overflow: hidden;
            transition: 0.4s; transform: scale(0.9); opacity: 0.4; border: 1px solid var(--glass-border); aspect-ratio: 4/5; cursor: pointer;
        }
        .host-card.active { transform: scale(1); opacity: 1; border-color: var(--brand-gold); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2); }
        .host-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .host-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); text-align: center; pointer-events: none; }
        .carousel-spacer { flex: 0 0 15%; }

        /* --- 福利分級 --- */
        .tier-cards-stack { display: flex; flex-direction: column; gap: 15px; margin: 0 20px 40px; }
        .tier-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; }
        .tier-gold { border: 2px solid var(--brand-gold); background: linear-gradient(145deg, #1a0b2e 0%, #05050a 100%); }
        .tier-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; display: block; color: var(--gold-light); }
        .tier-content-list { list-style: none; font-size: 13px; color: #eee; }
        .tier-content-list li::before { content: '✦ '; color: var(--brand-gold); }

        /* --- 底部按鈕修正 --- */
        .cta-container {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; padding: 20px;
            background: linear-gradient(to top, var(--bg-dark) 80%, transparent 100%);
            z-index: 1000;
        }
        .main-btn {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            background: var(--gold-gradient); color: black; font-size: 18px; font-weight: 800;
            cursor: pointer; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); display: block; transition: 0.3s;
        }
        .main-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        
        /* Skeleton Loading 效果 */
        .skeleton { animation: skeleton-loading 1.5s infinite linear; background: #222 !important; color: transparent !important; border: none !important; }
        @keyframes skeleton-loading { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a14; border: 1px solid var(--glass-border); width: 90%; max-width: 420px; border-radius: 30px; overflow: hidden; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .modal-body { padding: 20px; }
        .ticket-badge { background: var(--gold-gradient); color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; margin-right: 8px; }
        .btn-profile { display: block; width: 100%; padding: 14px; border-radius: 12px; background: var(--gold-gradient); color: black; font-weight: bold; text-decoration: none; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="switchLang('zh')">繁</button>
        <button class="lang-btn" onclick="switchLang('cn')">简</button>
        <button class="lang-btn" onclick="switchLang('en')">EN</button>
        <button class="lang-btn" onclick="switchLang('jp')">JP</button>
    </div>

    <div class="container">
        <header class="hero-banner">
            <img src="https://public.swag.live/campaigns/vip-offline-event/%E8%B3%87%E7%94%A2%201.png" class="hero-image" alt="2026 VIP GALA">
        </header>

        <section class="basic-info-box">
            <div class="info-item"><div class="info-icon">📅</div><div><p id="t-date-label" style="font-size: 10px; opacity: 0.6;">活動時間</p><p id="t-date-val" style="font-weight: bold; font-size: 13px; color: var(--gold-light);">2026/03/29 (週日) 13:00</p></div></div>
            <div class="info-item"><div class="info-icon">📍</div><div><p id="t-loc-label" style="font-size: 10px; opacity: 0.6;">活動地點</p><p id="t-loc-val" style="font-weight: bold; font-size: 13px; color: var(--gold-light);">台北市大直區 (行前通知告知)</p></div></div>
        </section>

        <section class="host-section">
            <div class="carousel-wrapper" id="carousel"></div>
            <p id="t-host-tip" style="text-align: center; font-size: 12px; color: var(--brand-gold); margin-top: 10px;">✦ 點擊卡片查看互動詳情 ✦</p>
        </section>

        <section class="tier-cards-stack">
            <div class="tier-card tier-gold">
                <span class="tier-title">VIP LV 50 + Exclusive</span>
                <ul class="tier-content-list">
                    <li id="t-b1">頂級酒水餐點</li>
                    <li id="t-b2">專屬獨立休息室</li>
                    <li id="t-b3">尊榮級發放互動卷</li>
                </ul>
            </div>
        </section>

        <footer id="t-footer" style="text-align: center; font-size: 10px; color: var(--text-dim); padding-bottom: 120px;">* 活動最終解釋權歸本平台所有</footer>
    </div>

    <div class="cta-container">
        <!-- 初始狀態為骨架屏載入中 -->
        <button id="main-enroll-btn" class="main-btn skeleton" disabled>Loading...</button>
    </div>

    <!-- Modal -->
    <div class="modal" id="host-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img id="modal-img" src="" style="width: 100%; height: 280px; object-fit: cover;">
            <div class="modal-body">
                <h2 id="modal-name" style="color: white; margin-bottom: 5px;"></h2>
                <p id="modal-handle" style="color: var(--brand-gold); font-size: 14px; margin-bottom: 15px;"></p>
                <div id="modal-menu-container"></div>
                <a id="modal-link" href="#" target="_blank" class="btn-profile">前往主播主頁</a>
            </div>
        </div>
    </div>

    <script>
        // === 配置區 ===
        const API_BASE = "https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges";
        const RECHARGE_URL = "https://swag.live/recharge";
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdvjDWBwBhT37z7a8CK5rH5dXzIxJeKhWokhNK79OY8LCdjTA/viewform";

        const i18n = {
            zh: { enroll: "立即報名參加同樂會", recharge: "儲值 10000 鑽石即可報名", date: "活動時間", loc: "活動地點", host: "✦ 點擊卡片查看互動詳情 ✦", foot: "* 活動最終解釋權歸本平台所有" },
            en: { enroll: "Register Now", recharge: "Recharge 10k Diamonds to Register", date: "Event Date", loc: "Location", host: "✦ Click card for details ✦", foot: "* Final interpretation belongs to SWAG" },
            cn: { enroll: "立即报名参加同乐会", recharge: "储值 10000 钻石即可报名", date: "活动时间", loc: "活动地点", host: "✦ 点击卡片查看互动详情 ✦", foot: "* 活动最终解释权归本平台所有" },
            jp: { enroll: "今すぐ申し込む", recharge: "10000ダイヤをチャージして参加", date: "開催日時", loc: "場所", host: "✦ カードをタップして詳細を見る ✦", foot: "* 本イベントの最終決定権は当社に帰属します" }
        };

        const hostData = [
            { name: '粿粿', handle: '@guoguo777', img: 'https://public.swag.live/campaigns/vip-offline-event/image.png', link: 'https://swag.live/user/624c360b06776928e476b11b', menu: { 1: ['對看 5 秒'], 3: ['牽手 15 秒'], 5: ['抱抱 15 秒'] } },
            { name: '妘霏', handle: '@minicat', img: 'https://public.swag.live/campaigns/vip-offline-event/%E5%A6%98%E9%9D%9E.png', link: 'https://swag.live/user/5d3ff8a0290e25d7ee2315a4', menu: { 1: ['踩私密處 30秒'], 3: ['緊緊相擁 15秒'], 5: ['波浪洗面奶 15秒'] } },
            { name: '糖騎羊🐑', handle: '@belene.', img: 'https://public.swag.live/campaigns/vip-offline-event/belene_%E7%B3%96%E9%A8%8E%E7%BE%8A%F0%9F%90%91.jpeg', link: 'https://swag.live/user/671bcccf0f86853f534cc65e', menu: { 1: ['聊天3分鐘'], 3: ['對看5秒'], 5: ['大擁抱3秒'] } }
        ];

        let currentLang = 'zh';
        let canEnroll = false;

        // === 核心邏輯：判斷 Level ===
        async function checkUserLevel() {
            const btn = document.getElementById('main-enroll-btn');
            const urlParams = new URLSearchParams(window.location.search);
            // 自動解析網址列的 user_id，如果沒有則使用您提供的測試 ID
            const userId = urlParams.get('user_id') || "693d121965e1e17a7f081d74";

            try {
                const response = await fetch(`${API_BASE}?user_id=${userId}`);
                const data = await response.json();
                
                // 假設 API 回傳結構中含有 level 欄位
                const level = data.level || 0;
                canEnroll = (level >= 1);

                // 更新按鈕狀態
                btn.classList.remove('skeleton');
                btn.disabled = false;
                updateButtonUI();

            } catch (err) {
                console.error("API Error:", err);
                btn.innerText = "Network Error - Retry";
                btn.classList.remove('skeleton');
            }
        }

        function updateButtonUI() {
            const btn = document.getElementById('main-enroll-btn');
            if (canEnroll) {
                btn.innerText = i18n[currentLang].enroll;
                btn.style.background = "var(--gold-gradient)";
                btn.onclick = () => window.open(FORM_URL, '_blank');
            } else {
                btn.innerText = i18n[currentLang].recharge;
                btn.style.background = "linear-gradient(135deg, #444, #222)";
                btn.style.color = "#ccc";
                btn.style.border = "1px solid var(--brand-pink)";
                btn.onclick = () => window.open(RECHARGE_URL, '_blank');
            }
        }

        function switchLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('t-date-label').innerText = i18n[lang].date;
            document.getElementById('t-loc-label').innerText = i18n[lang].loc;
            document.getElementById('t-host-tip').innerText = i18n[lang].host;
            document.getElementById('t-footer').innerText = i18n[lang].foot;
            
            updateButtonUI();
        }

        // === 介面功能：主播輪播與彈窗 ===
        function initCarousel() {
            const container = document.getElementById('carousel');
            container.innerHTML = '<div class="carousel-spacer"></div>';
            hostData.forEach((host) => {
                const card = document.createElement('div');
                card.className = 'host-card';
                card.innerHTML = `<img src="${host.img}" class="host-img"><div class="host-info"><p style="font-size:12px; color:var(--brand-gold);">${host.handle}</p><p style="font-weight:bold;">${host.name}</p></div>`;
                card.onclick = () => openModal(host);
                container.appendChild(card);
            });
            container.innerHTML += '<div class="carousel-spacer"></div>';

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => e.target.classList.toggle('active', e.isIntersecting));
            }, { root: container, threshold: 0.6 });
            document.querySelectorAll('.host-card').forEach(c => observer.observe(c));
        }

        function openModal(host) {
            const modal = document.getElementById('host-modal');
            document.getElementById('modal-img').src = host.img;
            document.getElementById('modal-name').innerText = host.name;
            document.getElementById('modal-handle').innerText = host.handle;
            document.getElementById('modal-link').href = host.link;
            
            const menuContainer = document.getElementById('modal-menu-container');
            menuContainer.innerHTML = '';
            [1, 3, 5].forEach(ticket => {
                const items = host.menu[ticket].map(it => `<p style="font-size:13px; color:#eee; margin-bottom:4px;">✦ ${it}</p>`).join('');
                menuContainer.innerHTML += `<div style="margin-bottom:12px;"><span class="ticket-badge">${ticket} 券</span>${items}</div>`;
            });
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('host-modal').style.display = 'none'; }

        window.onload = () => {
            initCarousel();
            checkUserLevel();
        };
    </script>
</body>
</html>
