<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 VIP Offline Gala | Exclusive Access</title>
    <style>
        :root {
            --bg-dark: #05050a; 
            --brand-gold: #d4af37; 
            --gold-light: #fceabb;
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --silver-gradient: linear-gradient(135deg, #a8caba 0%, #5d9193 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2); 
            --text-dim: rgba(255, 255, 255, 0.6);
            --brand-pink: #ff2d78;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; line-height: 1.5; }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 20px; perspective: 1000px; }

        .hero-banner {
            width: 100%;
            display: block;
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-dark) 70%);
            padding-top: 10px;
        }
        .hero-image { width: 100%; height: auto; display: block; }

        .basic-info-box {
            margin: 0 20px 30px; padding: 20px; border-radius: 20px;
            background: linear-gradient(180deg, rgba(20, 20, 35, 0.8) 0%, var(--bg-dark) 100%);
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .info-item { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .info-icon { width: 32px; height: 32px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold-light); border: 1px solid var(--glass-border); }

        /* --- 主播輪播區 --- */
        .host-section { margin-bottom: 30px; position: relative; width: 100%; }
        .carousel-wrapper {
            display: flex; overflow-x: auto; gap: 0;
            scroll-snap-type: x mandatory; padding: 30px 0;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        .host-card {
            flex: 0 0 70%; scroll-snap-align: center;
            position: relative; border-radius: 30px; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform: scale(0.85); opacity: 0.3;
            filter: blur(2px) grayscale(40%); border: 1px solid var(--glass-border); aspect-ratio: 4/5; cursor: pointer;
        }
        .host-card.active { transform: scale(1.05); opacity: 1; filter: blur(0) grayscale(0); border-color: var(--brand-gold); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2); z-index: 2; }
        .host-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .host-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); text-align: center; pointer-events: none; }
        .carousel-spacer { flex: 0 0 15%; }

        .interaction-flow { margin: 0 20px 40px; padding: 25px 15px; border-radius: 24px; background: var(--glass); border: 1px solid var(--glass-border); text-align: center; }
        .flow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .flow-icon { width: 45px; height: 45px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--brand-gold); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--brand-gold); }

        .tiers-header { padding: 0 20px; margin-bottom: 20px; color: var(--gold-light); font-size: 1.2rem; font-weight: 800; text-align: center; letter-spacing: 2px; }
        .tier-cards-stack { display: flex; flex-direction: column; gap: 15px; margin: 0 20px 40px; }
        .tier-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; position: relative; overflow: hidden; }
        .tier-gold { background: linear-gradient(145deg, #1a0b2e 0%, #05050a 100%); border: 2px solid var(--brand-gold); }
        .tier-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; display: block; color: var(--gold-light); }
        .tier-content-list { list-style: none; }
        .tier-content-list li { font-size: 13px; color: #eee; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .tier-content-list li::before { content: '✦'; font-size: 10px; color: var(--brand-gold); }

        .reward-group { margin: 0 20px 40px; border-radius: 24px; background: var(--glass); border: 1px solid var(--glass-border); overflow: hidden; }
        .reward-table { padding: 15px 20px; }
        .reward-row { display: grid; grid-template-columns: 85px 1fr; border-bottom: 1px solid var(--glass-border); padding: 10px 0; }
        .row-head { font-size: 11px; font-weight: bold; color: var(--brand-gold); }
        .row-body { font-size: 13px; color: #fff; line-height: 1.4; }
        .lv30-banner { background: linear-gradient(90deg, #1e1e2e, #0a0a14); padding: 15px; border-top: 1px solid var(--brand-gold); text-align: center; }

        /* --- Modal --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #0a0a14; border: 1px solid var(--glass-border); width: 90%; max-width: 420px; border-radius: 30px; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(212, 175, 55, 0.2); border: none; color: var(--gold-light); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 10; }
        .modal-img { width: 100%; height: 320px; object-fit: cover; }
        .modal-body { padding: 25px; }
        .ticket-badge { background: var(--gold-gradient); color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; margin-right: 8px; }
        .btn-profile { display: block; width: 100%; padding: 16px; border-radius: 15px; background: var(--gold-gradient); color: black; font-weight: bold; text-decoration: none; margin-top: 25px; text-align: center; }

        /* --- 底部按鈕 --- */
        .cta-container {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px;
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg-dark) 80%, transparent 100%); z-index: 1000;
        }
        .main-btn {
            width: 100%; padding: 18px; border-radius: 50px; border: none; background: var(--gold-gradient);
            color: black; font-size: 18px; font-weight: 800; cursor: pointer; display: block;
        }
        .skeleton { animation: pulse 1.5s infinite; background: #333 !important; color: transparent !important; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-banner">
            <img src="https://public.swag.live/campaigns/vip-offline-event/%E8%B3%87%E7%94%A2%201.png" class="hero-image">
        </header>

        <section class="basic-info-box">
            <div class="info-item"><div class="info-icon">📅</div><div><p style="font-size: 10px; opacity: 0.6;">活動時間</p><p style="font-weight: bold; font-size: 13px; color: var(--gold-light);">2026/03/29 (週日) 13:00 - 17:00</p></div></div>
            <div class="info-item"><div class="info-icon">📍</div><div><p style="font-size: 10px; opacity: 0.6;">活動地點</p><p style="font-weight: bold; font-size: 13px; color: var(--gold-light);">台北市大直區 (3/23私訊行前通知)</p></div></div>
        </section>

        <section class="host-section">
            <div class="carousel-wrapper" id="carousel"></div>
            <p style="text-align: center; font-size: 14px; color: var(--brand-gold); margin-top: 15px;">✦ 點擊卡片查看互動詳情 ✦</p>
        </section>

        <div class="tiers-header">👑 報到福利與階級特權</div>
        <section class="tier-cards-stack">
            <div class="tier-card tier-gold">
                <span class="tier-title">VIP LV 50 + Exclusive</span>
                <ul class="tier-content-list">
                    <li>酒水餐點與獨立休息室</li>
                    <li>依照等級發放互動卷</li>
                </ul>
            </div>
        </section>

        <section class="reward-group">
            <div style="padding: 20px 20px 5px; color: #00f2ff; font-size: 1.1rem; font-weight: 800;">💎 數十萬鑽石大獎</div>
            <div class="reward-table">
                <div class="reward-row"><div class="row-head">出席20人 達成</div><div class="row-body">200,000 鑽石（1位）</div></div>
                <div class="reward-row"><div class="row-head">出席50人 達成</div><div class="row-body">400,000 鑽石（1位） / 200,000 鑽石（2位）</div></div>
            </div>
        </section>

        <footer style="text-align: center; font-size: 10px; color: var(--text-dim); padding-bottom: 150px;">* 活動最終解釋權歸本平台所有</footer>
    </div>

    <div class="cta-container">
        <button id="main-enroll-btn" class="main-btn skeleton" disabled>Loading...</button>
    </div>

    <!-- Modal -->
    <div class="modal" id="host-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img id="modal-img" src="" class="modal-img">
            <div class="modal-body">
                <h2 id="modal-name" style="color: white; margin-bottom: 5px;"></h2>
                <p id="modal-handle" style="color: var(--brand-gold); font-size: 14px; font-weight: bold;"></p>
                <div id="modal-menu-container"></div>
                <a id="modal-link" href="#" target="_blank" class="btn-profile">前往主播主頁</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges";
        const RECHARGE_URL = "https://swag.live/recharge";
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdvjDWBwBhT37z7a8CK5rH5dXzIxJeKhWokhNK79OY8LCdjTA/viewform";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzEsYmYnJOHUJmEzcuyDNBaZUt2j1kaKsLebjsqTZ1zKi3JYy4dFKZ9bmd4FfWyb41x/exec";

        const hostData = [
            { name: '粿粿', handle: '@guoguo777', img: 'https://public.swag.live/campaigns/vip-offline-event/image.png', link: 'https://swag.live/user/624c360b06776928e476b11b', menu: { 1: ['對看 5 秒'], 3: ['對看 5 秒 + 牽手 15 秒'], 5: ['對看 5 秒 + 牽手 15 秒', '或 抱抱 15 秒'] } },
            { name: '妘霏', handle: '@minicat', img: 'https://public.swag.live/campaigns/vip-offline-event/%E5%A6%98%E9%9D%9E.png', link: 'https://swag.live/user/5d3ff8a0290e25d7ee2315a4', menu: { 1: ['坐大腿抓手 30秒'], 3: ['緊緊相擁 15秒'], 5: ['波浪洗面奶 15秒'] } },
            { name: '葡萄', handle: '@stellajs', img: 'https://public.swag.live/campaigns/vip-offline-event/IMG_3986%20-%20%E5%B0%8F%E8%8A%B1.jpeg', link: 'https://swag.live/user/6186407baf71d358d49be7de', menu: { 1: ['High Five'], 3: ['十指緊扣 10 秒'], 5: ['擁抱 20 秒'] } },
            { name: '凱希 77', handle: '@sugercathy', img: 'https://public.swag.live/campaigns/vip-offline-event/IMG_0201%20-%20%E9%A8%B7%E5%87%B1%E5%B8%8C.jpeg', link: 'https://swag.live/user/6049f47a9dff9d48464b1399', menu: { 1: ['十指緊扣 10 秒'], 3: ['看奶頭 10 秒'], 5: ['洗面奶 20 秒'] } },
            { name: '糖騎羊🐑', handle: '@belene.', img: 'https://public.swag.live/campaigns/vip-offline-event/belene_%E7%B3%96%E9%A8%8E%E7%BE%8A%F0%9F%90%91.jpeg', link: 'https://swag.live/user/671bcccf0f86853f534cc65e', menu: { 1: ['聊天3分鐘'], 3: ['對看5秒'], 5: ['大擁抱3秒'] } },
            { name: '金金', handle: '@chinchin1010', img: 'https://public.swag.live/campaigns/vip-offline-event/chinchin1010_%E9%87%91%E9%87%91.jpeg', link: 'https://swag.live/user/67ee5ea8b8ccbeb66ca67f78', menu: { 1: ['對看10秒'], 3: ['勾手臂10秒'], 5: ['磨鼻子10秒'] } },
            { name: '蜘蛛網', handle: '@wasteful', img: 'https://public.swag.live/campaigns/vip-offline-event/wasteful_%E8%9C%98%E8%9B%9B%E7%B6%B2.jpeg', link: 'https://swag.live/user/68d3ad7efdbd3e34bbc924da', menu: { 1: ['牽手30秒'], 3: ['親臉頰30秒'], 5: ['全裸自慰秀60秒'] } },
            { name: '魚美人', handle: '@woolice42', img: 'https://public.swag.live/campaigns/vip-offline-event/woolice42_%E9%AD%9A%E7%BE%8E%E4%BA%BA.JPG', link: 'https://swag.live/user/69815f42cd46ac834e55c177', menu: { 1: ['牽手20秒'], 3: ['對視10秒'], 5: ['抱抱15秒'] } }
        ];

        async function checkUserLevel() {
            const btn = document.getElementById('main-enroll-btn');
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id') || "693d121965e1e17a7f081d74";

            try {
                const res = await fetch(`${API_BASE}?user_id=${userId}`);
                const data = await res.json();
                const level = data.level || 0;

                btn.classList.remove('skeleton');
                btn.disabled = false;

                if (level >= 1) {
                    btn.innerText = "立即報名參加同樂會";
                    btn.style.background = "var(--gold-gradient)";
                    btn.onclick = () => {
                        fetch(GAS_URL, { mode: 'no-cors' });
                        window.open(FORM_URL, '_blank');
                    };
                } else {
                    btn.innerText = "儲值 10000 鑽石即可報名";
                    btn.style.background = "linear-gradient(135deg, #444, #222)";
                    btn.style.border = "1px solid var(--brand-pink)";
                    btn.onclick = () => window.open(RECHARGE_URL, '_blank');
                }
            } catch (e) {
                btn.innerText = "Error - Please Retry";
                btn.classList.remove('skeleton');
            }
        }

        function initHosts() {
            const container = document.getElementById('carousel');
            container.innerHTML = '<div class="carousel-spacer"></div>';
            hostData.forEach(host => {
                const card = document.createElement('div');
                card.className = 'host-card';
                card.innerHTML = `<img src="${host.img}" class="host-img"><div class="host-info"><p class="host-handle">${host.handle}</p><p class="host-name">${host.name}</p></div>`;
                card.onclick = () => openModal(host);
                container.appendChild(card);
            });
            container.innerHTML += '<div class="carousel-spacer"></div>';
            
            const observer = new IntersectionObserver(entries => {
                entries.forEach(en => en.target.classList.toggle('active', en.isIntersecting));
            }, { root: container, threshold: 0.6 });
            document.querySelectorAll('.host-card').forEach(c => observer.observe(c));
        }

        function openModal(host) {
            const modal = document.getElementById('host-modal');
            document.getElementById('modal-img').src = host.img;
            document.getElementById('modal-name').innerText = host.name;
            document.getElementById('modal-handle').innerText = host.handle;
            document.getElementById('modal-link').href = host.link;
            const container = document.getElementById('modal-menu-container');
            container.innerHTML = '';
            [1, 3, 5].forEach(t => {
                const items = host.menu[t].map(i => `<div style="color:white; font-size:14px; margin-bottom:5px;">✦ ${i}</div>`).join('');
                container.innerHTML += `<div style="margin:15px 0 5px;"><span class="ticket-badge">${t} 張券</span></div>${items}`;
            });
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('host-modal').classList.remove('active');
        }

        window.onload = () => {
            initHosts();
            checkUserLevel();
        };
    </script>
</body>
</html>
